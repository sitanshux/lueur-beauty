<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Login or create an account at Lueur Beauty. Access your orders, wishlist, and exclusive member offers."/>
  <title>Login | Lueur Beauty</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>"/>
  <script src="website-editor-runtime.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" id="nav-logo-text">Lueur <em>Beauty</em></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="wishlist.html" class="cart-icon" id="wishlist-icon-login" title="Wishlist" style="margin-right:15px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="wishlist-badge" id="wishlist-badge-login">0</span>
      </a>
      <a href="cart.html" class="cart-icon" id="cart-icon-login">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="m16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" id="cart-badge-login">0</span>
      </a>
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
  </div>
</nav>

<!-- AUTH -->
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo">
      <h2 style="margin-bottom:4px">Lueur <em>Beauty</em></h2>
      <p style="letter-spacing:2px;font-size:.7rem;text-transform:uppercase;color:var(--text-light)">Member Access</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login-form" id="tab-login">Sign In</button>
      <button class="auth-tab" data-tab="signup-form" id="tab-signup">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <form class="auth-form active" id="login-form">
      <div class="social-auth">
        <button type="button" class="social-auth-btn">🌐 Google</button>
        <button type="button" class="social-auth-btn">🍎 Apple</button>
      </div>
      <div class="divider"><span>or sign in with email</span></div>
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" placeholder="Your password" required/>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label class="form-check" style="margin:0">
          <input type="checkbox" id="remember-me"/> Remember me
        </label>
        <div class="forgot-link">Forgot password?</div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      <p style="text-align:center;font-size:.78rem;color:var(--text-light);margin-top:16px">
        💡 Seller? Use <strong>seller.lueur@admin.com</strong> to access the dashboard
      </p>
    </form>

    <!-- SIGNUP FORM -->
    <form class="auth-form" id="signup-form">
      <div class="social-auth">
        <button type="button" class="social-auth-btn">🌐 Google</button>
        <button type="button" class="social-auth-btn">🍎 Apple</button>
      </div>
      <div class="divider"><span>or sign up with email</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label for="signup-first">First Name</label>
          <input type="text" id="signup-first" placeholder="Jane" required/>
        </div>
        <div class="form-group">
          <label for="signup-last">Last Name</label>
          <input type="text" id="signup-last" placeholder="Doe" required/>
        </div>
      </div>
      <div class="form-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="signup-pass">Password</label>
        <input type="password" id="signup-pass" placeholder="Min. 8 characters" required minlength="8"/>
      </div>
      <label class="form-check" style="margin-bottom:20px">
        <input type="checkbox" required/> I agree to the <a href="#" style="color:var(--rose)">Terms &amp; Privacy Policy</a>
      </label>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
  </div>
</section>

<script type="module" src="firebase.js"></script>
<script defer src="script.js"></script>
</body>
</html>
